<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="assets/logo.jpg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <title>Conversor de Moedas</title>
</head>

<body>
  <img class="logo" src="./assets/logo.jpg" alt="logo-conversor-de-moedas">

  <main>

    <label>
      Converter <b>de</b>
      <select class="currency-select-to-convert">
        <option value="real">R$ Real Brasileiro</option>
        <option value="dolar">US$ Dolar Americano</option>
        <option value="euro">€ Euro</option>
        <option value="bitcoin">₿ Bitcoin</option>
      </select>
    </label>

    <label>
      Converter <b>para</b>
      <select class="currency-select-converted">
        <option value="real">R$ Real Brasileiro</option>
        <option value="dolar">U$ Dolar Americano</option>
        <option value="euro">€ Euro</option>
        <option value="bitcoin">₿ Bitcoin</option>
      </select>
    </label>

    <label>
      <b>Valor</b>
      <input class="input-currency" placeholder="R$ 10.000,00">
    </label>

    <button class="convert-button">Converter</button>

    <section>
      <div class="currency-box">
        <img src="./assets/real.png" alt="moeda-a-converter">
        <p class="currency" id="currency-name-to-convert">Real</p>
        <p class="currency-value-to-convert">R$ 0,00</p>
      </div>

      <img class="arrow-img" src="./assets/seta.png" alt="seta">

      <div class="currency-box">
        <img src="./assets/dolar.png" alt="moeda-a-convertida">
        <p class="currency" id="currency-name">Dolar</p>
        <p class="currency-value-converted">US$ 0.0</p>
      </div>
    </section>

  </main>
</body>
<script src="script.js"></script>

</html>
